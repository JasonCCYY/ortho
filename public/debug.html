<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 診斷</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #f5f5f7; min-height: 100vh; padding: 24px 16px; color: #1d1d1f; }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 20px; letter-spacing: -.2px; }
  .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e5e5ea; }
  .card-title { font-size: 13px; font-weight: 600; font-family: monospace; color: #1d1d1f; margin-bottom: 10px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .badge-ok    { background: #d1fae5; color: #065f46; }
  .badge-404   { background: #fee2e2; color: #991b1b; }
  .badge-500   { background: #ffedd5; color: #9a3412; }
  .badge-wait  { background: #f3f4f6; color: #6b7280; }
  .badge-timeout { background: #fee2e2; color: #991b1b; }
  .meta { font-size: 11px; color: #8e8e93; margin-top: 4px; }
  .result-box { margin-top: 10px; background: #f5f5f7; border-radius: 8px; padding: 10px; font-size: 12px; line-height: 1.6; }
  .row { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; }
  .diag { font-size: 12px; font-weight: 500; margin-top: 8px; }
  .diag.ok      { color: #059669; }
  .diag.err-404 { color: #dc2626; }
  .diag.err-500 { color: #ea580c; }
  .diag.err-t   { color: #dc2626; }
  pre { font-size: 10px; color: #6b7280; overflow: auto; max-height: 80px; white-space: pre-wrap; word-break: break-all; margin-top: 6px; }
  button { margin-top: 16px; padding: 9px 24px; background: #1d1d1f; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
  button:disabled { background: #aeaeb2; cursor: not-allowed; }
  .legend { margin-top: 20px; font-size: 11px; color: #8e8e93; line-height: 2; border-top: 1px solid #e5e5ea; padding-top: 14px; }
  .legend b { color: #1d1d1f; }
</style>
</head>
<body>
<h1>🔍 API 診斷工具</h1>

<div class="card" id="card-1">
  <div class="card-title">/api/get-clinic <span class="badge badge-wait" id="badge-1">等待中</span></div>
  <div class="meta" id="meta-1">—</div>
  <div class="result-box" id="result-1" style="display:none"></div>
</div>

<div class="card" id="card-2">
  <div class="card-title">/api/get-clinic2 <span class="badge badge-wait" id="badge-2">等待中</span></div>
  <div class="meta" id="meta-2">—</div>
  <div class="result-box" id="result-2" style="display:none"></div>
</div>

<button id="btn" onclick="runAll()">重新測試</button>

<div class="legend">
  <b>200</b> = 正常運作 ✓<br>
  <b>404</b> = Vercel 找不到此路由 → 需要重新 deploy<br>
  <b>500</b> = 函式執行錯誤 → 可能是醫院網站封鎖 Vercel IP<br>
  <b>逾時</b> = 超過 12 秒無回應 → 醫院網站封鎖 Vercel IP 的可能性高<br>
  <b>網路錯誤</b> = 其他連線問題
</div>

<script>
const ENDPOINTS = [
  { id: '1', url: '/api/get-clinic',  label: '/api/get-clinic'  },
  { id: '2', url: '/api/get-clinic2', label: '/api/get-clinic2' },
];

function setBadge(id, status) {
  const el = document.getElementById('badge-' + id);
  if (status === null)      { el.className='badge badge-wait';    el.textContent='測試中...'; }
  else if (status === 200)  { el.className='badge badge-ok';      el.textContent='200 ✓ 成功'; }
  else if (status === 404)  { el.className='badge badge-404';     el.textContent='404 未部署'; }
  else if (status === 500)  { el.className='badge badge-500';     el.textContent='500 函式錯誤'; }
  else if (status==='timeout'){ el.className='badge badge-timeout'; el.textContent='逾時'; }
  else                      { el.className='badge badge-500';     el.textContent=status; }
}

async function test(ep) {
  const start = Date.now();
  setBadge(ep.id, null);
  document.getElementById('meta-'+ep.id).textContent = '—';
  document.getElementById('result-'+ep.id).style.display = 'none';

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 12000);
    const res = await fetch(ep.url, { signal: ctrl.signal });
    clearTimeout(timer);
    const ms = Date.now() - start;
    setBadge(ep.id, res.status);
    document.getElementById('meta-'+ep.id).textContent = '耗時 ' + ms + 'ms';

    const box = document.getElementById('result-'+ep.id);
    box.style.display = 'block';
    let text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch(_){}

    if (res.status === 200 && json && json.ok) {
      const rows = json.results || [];
      box.innerHTML = '<div class="diag ok">✓ 抓到 ' + rows.length + ' 筆掛號資料</div>'
        + (rows.slice(0,3).map(r =>
            '<div class="row"><span>' + r.date + '</span><span>' + r.session + '</span><span>' + r.room + '</span><span>#' + r.num + '</span></div>'
          ).join(''));
    } else if (res.status === 404) {
      box.innerHTML = '<div class="diag err-404">❌ Vercel 找不到此路由，需要重新 deploy</div><pre>' + text.slice(0,200) + '</pre>';
    } else if (res.status === 500) {
      box.innerHTML = '<div class="diag err-500">⚠️ 函式執行錯誤（可能是醫院網站封鎖或程式錯誤）</div>'
        + (json && json.error ? '<pre>' + json.error + '</pre>' : '<pre>' + text.slice(0,200) + '</pre>');
    } else {
      box.innerHTML = '<div class="diag err-500">狀態碼 ' + res.status + '</div><pre>' + text.slice(0,200) + '</pre>';
    }
  } catch(e) {
    const ms = Date.now() - start;
    const isTimeout = e.name === 'AbortError';
    setBadge(ep.id, isTimeout ? 'timeout' : e.message.slice(0,20));
    document.getElementById('meta-'+ep.id).textContent = '耗時 ' + ms + 'ms';
    const box = document.getElementById('result-'+ep.id);
    box.style.display = 'block';
    if (isTimeout) {
      box.innerHTML = '<div class="diag err-t">❌ 逾時 12 秒 — 醫院網站可能封鎖了 Vercel 的 IP</div>';
    } else {
      box.innerHTML = '<div class="diag err-t">❌ 網路錯誤: ' + e.message + '</div>';
    }
  }
}

async function runAll() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '測試中...';
  await Promise.all(ENDPOINTS.map(test));
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '重新測試';
}

runAll();
</script>
</body>
</html>
