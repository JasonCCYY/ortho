<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 診斷</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #f5f5f7; min-height: 100vh; padding: 24px 16px; color: #1d1d1f; }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 12px; color: #8e8e93; margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .5px; margin: 16px 0 8px; }
  .card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid #e5e5ea; }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .endpoint { font-size: 13px; font-weight: 600; font-family: monospace; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok      { background: #d1fae5; color: #065f46; }
  .badge-404     { background: #fee2e2; color: #991b1b; }
  .badge-500     { background: #ffedd5; color: #9a3412; }
  .badge-wait    { background: #f3f4f6; color: #6b7280; }
  .badge-timeout { background: #fee2e2; color: #991b1b; }
  .meta { font-size: 11px; color: #8e8e93; margin-top: 4px; }
  .detail { margin-top: 10px; background: #f5f5f7; border-radius: 8px; padding: 10px; font-size: 12px; display: none; }
  .diag-ok  { color: #059669; font-weight: 600; }
  .diag-err { color: #dc2626; font-weight: 600; }
  .data-row { font-size: 11px; font-family: monospace; margin-top: 3px; color: #374151; }
  pre { font-size: 10px; color: #6b7280; overflow: auto; max-height: 60px; white-space: pre-wrap; word-break: break-all; margin-top: 6px; }
  button { margin-top: 16px; padding: 9px 24px; background: #1d1d1f; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
  button:disabled { background: #aeaeb2; cursor: not-allowed; }
  .legend { margin-top: 20px; font-size: 11px; color: #8e8e93; line-height: 2; border-top: 1px solid #e5e5ea; padding-top: 14px; }
  .legend b { color: #1d1d1f; }
</style>
</head>
<body>
<h1>🔍 API 診斷工具</h1>
<div class="sub">自動測試所有 API 端點，確認哪些已部署</div>

<div class="section-title">目前呼叫的端點（新名稱）</div>
<div class="card" id="card-get-clinic">
  <div class="row"><span class="endpoint">/api/get-clinic</span><span class="badge badge-wait" id="badge-get-clinic">等待中</span></div>
  <div class="meta" id="meta-get-clinic">—</div>
  <div class="detail" id="detail-get-clinic"></div>
</div>
<div class="card" id="card-get-clinic2">
  <div class="row"><span class="endpoint">/api/get-clinic2</span><span class="badge badge-wait" id="badge-get-clinic2">等待中</span></div>
  <div class="meta" id="meta-get-clinic2">—</div>
  <div class="detail" id="detail-get-clinic2"></div>
</div>

<div class="section-title">舊端點（原始部署）</div>
<div class="card" id="card-clinic">
  <div class="row"><span class="endpoint">/api/clinic</span><span class="badge badge-wait" id="badge-clinic">等待中</span></div>
  <div class="meta" id="meta-clinic">—</div>
  <div class="detail" id="detail-clinic"></div>
</div>
<div class="card" id="card-clinic2">
  <div class="row"><span class="endpoint">/api/clinic2</span><span class="badge badge-wait" id="badge-clinic2">等待中</span></div>
  <div class="meta" id="meta-clinic2">—</div>
  <div class="detail" id="detail-clinic2"></div>
</div>

<button id="btn" onclick="runAll()">重新測試</button>

<div class="legend">
  <b>200 + 資料</b> = 正常 ✓<br>
  <b>404</b> = 路由不存在（未部署）<br>
  <b>500</b> = 函式錯誤（可能是醫院封鎖）<br>
  <b>逾時</b> = 醫院網站封鎖 Vercel IP
</div>

<script>
const EPS = [
  { key: 'get-clinic',  url: '/api/get-clinic'  },
  { key: 'get-clinic2', url: '/api/get-clinic2' },
  { key: 'clinic',      url: '/api/clinic'      },
  { key: 'clinic2',     url: '/api/clinic2'     },
];

function setBadge(key, status) {
  const el = document.getElementById('badge-' + key);
  const map = {
    null:      ['badge-wait',    '測試中...'],
    200:       ['badge-ok',      '200 ✓ 成功'],
    404:       ['badge-404',     '404 未部署'],
    500:       ['badge-500',     '500 函式錯誤'],
    timeout:   ['badge-timeout', '逾時'],
  };
  const [cls, txt] = map[status] || ['badge-500', String(status)];
  el.className = 'badge ' + cls;
  el.textContent = txt;
}

async function test(ep) {
  const t0 = Date.now();
  setBadge(ep.key, null);
  document.getElementById('meta-' + ep.key).textContent = '—';
  const det = document.getElementById('detail-' + ep.key);
  det.style.display = 'none';

  try {
    const ctrl = new AbortController();
    const tmr = setTimeout(() => ctrl.abort(), 12000);
    const res = await fetch(ep.url, { signal: ctrl.signal });
    clearTimeout(tmr);
    const ms = Date.now() - t0;
    setBadge(ep.key, res.status);
    document.getElementById('meta-' + ep.key).textContent = '耗時 ' + ms + 'ms';
    det.style.display = 'block';

    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch(_) {}

    if (res.status === 200 && json?.ok) {
      const rows = json.results || [];
      det.innerHTML = '<div class="diag-ok">✓ 抓到 ' + rows.length + ' 筆資料</div>'
        + rows.slice(0, 3).map(r =>
            '<div class="data-row">' + r.date + '  ' + (r.session||'') + '  ' + (r.room||'') + '  #' + r.num + '</div>'
          ).join('');
    } else if (res.status === 404) {
      det.innerHTML = '<div class="diag-err">❌ 路由不存在 → 需要 deploy</div><pre>' + text.slice(0,150) + '</pre>';
    } else if (res.status === 500) {
      det.innerHTML = '<div class="diag-err">⚠️ 函式錯誤</div>'
        + (json?.error ? '<pre>' + json.error + '</pre>' : '<pre>' + text.slice(0,150) + '</pre>');
    } else {
      det.innerHTML = '<div class="diag-err">狀態碼 ' + res.status + '</div><pre>' + text.slice(0,150) + '</pre>';
    }
  } catch(e) {
    const ms = Date.now() - t0;
    const isT = e.name === 'AbortError';
    setBadge(ep.key, isT ? 'timeout' : String(res?.status || 'error'));
    document.getElementById('meta-' + ep.key).textContent = '耗時 ' + ms + 'ms';
    det.style.display = 'block';
    det.innerHTML = isT
      ? '<div class="diag-err">❌ 逾時 → 醫院可能封鎖 Vercel IP</div>'
      : '<div class="diag-err">❌ ' + e.message + '</div>';
  }
}

async function runAll() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '測試中...';
  await Promise.all(EPS.map(test));
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '重新測試';
}

runAll();
</script>
</body>
</html>
