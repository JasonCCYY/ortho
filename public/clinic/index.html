<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="診號查詢">
<meta name="theme-color" content="#1a7fd4">
<title>診號查詢</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
</head>
<body>

<div id="auth-screen" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(160deg,#e8eef8 0%,#d4e0f0 60%,#c8d8ec 100%);padding:2rem;gap:1.4rem">
  <div style="border-radius:22px;overflow:hidden;box-shadow:var(--shadow)"><img src="/icons/icon-192.png" style="width:96px;height:96px;display:block"></div>
  <div style="font-size:1.6rem;font-weight:700;color:var(--accent)">診號查詢</div>
  <button class="btn-google" onclick="AUTH.signIn()">
    <img src="https://www.google.com/favicon.ico" alt="" style="width:20px">
    使用 Google 帳號登入
  </button>
</div>

<div id="main-app" style="display:none;flex-direction:column;height:100dvh;background:var(--bg)">

  <div id="header">
    <button class="back-btn" onclick="window.location.href='/'" title="回到手術記錄">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      手術
    </button>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="APP.refresh()" title="重新整理">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="hdr-btn" onclick="AUTH.signOut()" title="登出">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div id="clinic-scroll" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:12px">

    <!-- 蔣元鈞 -->
    <div class="clinic-section">
      <div class="clinic-section-hdr">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        蔣元鈞 · 近兩週預約診號
      </div>
      <div class="col-hdr-row clinic-col-hdr">
        <span class="th" style="width:96px">日期</span>
        <span class="th" style="width:52px">時段</span>
        <span class="th" style="flex:1">診間</span>
        <span class="th" style="width:52px;text-align:right">診號</span>
      </div>
      <div id="appt-body">
        <div class="list-row"><span style="color:var(--muted);font-size:.9rem;padding:4px 0">
          <div class="spinner" style="margin:0 auto 8px"></div>載入中...
        </span></div>
      </div>
      <div class="clinic-note" id="appt-note" style="display:none">
        來源：<a href="http://register.jjoh.org/Main/Clinic100" target="_blank" style="color:var(--accent)">中正掛號系統</a> · 僅供參考
      </div>
    </div>

    <!-- 蘇皇儒 & 程俊傑 -->
    <div class="clinic-section">
      <div class="clinic-section-hdr">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        蘇皇儒 &amp; 程俊傑 · 近兩週預約診號
      </div>
      <div class="col-hdr-row clinic-col-hdr">
        <span class="th" style="width:96px">日期</span>
        <span class="th" style="width:52px">醫師</span>
        <span class="th" style="width:52px">時段</span>
        <span class="th" style="flex:1">診間</span>
        <span class="th" style="width:52px;text-align:right">診號</span>
      </div>
      <div id="appt2-body">
        <div class="list-row"><span style="color:var(--muted);font-size:.9rem;padding:4px 0">
          <div class="spinner" style="margin:0 auto 8px"></div>載入中...
        </span></div>
      </div>
      <div class="clinic-note" id="appt2-note" style="display:none">
        來源：<a href="http://register.jjoh.org/Main/Clinic100" target="_blank" style="color:var(--accent)">中正掛號系統</a> · 僅供參考
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/clinic/js/app.js"></script>
</body>
</html>
