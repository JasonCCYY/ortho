<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ortho">
<meta name="theme-color" content="#1a7fd4">
<title>Ortho Record</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="loading-ov" id="loading"><div class="spinner"></div><div style="color:var(--muted);font-size:.95rem">Ortho Record</div></div>

<div id="auth-screen">
  <div class="auth-logo" style="padding:0;overflow:hidden;border:none;box-shadow:none;background:transparent"><img src="/icons/icon-192.png" style="width:96px;height:96px;border-radius:22px;display:block"></div>
  <div class="auth-title">Ortho Record</div>
  <div class="auth-sub">骨科手術紀錄管理系統<br>請使用 Google 帳號登入</div>
  <button class="btn-google" onclick="AUTH.signIn()">
    <img src="https://www.google.com/favicon.ico" alt="">使用 Google 帳號登入
  </button>
</div>

<div id="desktop-layout"><div id="app" style="display:none">

  <div id="header">
    <button onclick="window.location.href='/clinic/'" title="診號查詢" style="display:flex;align-items:center;gap:5px;height:34px;padding:0 12px;border:none;background:#e4ecf4;border-radius:8px;color:var(--txt2);font-size:.84rem;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      診號
    </button>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="APP.refresh()" title="重新整理">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="hdr-btn" onclick="APP.openSearch()" title="搜尋">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="hdr-btn" onclick="AUTH.signOut()" title="登出">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>


  <!-- Surgery sub-tabs -->
  <div class="sub-tabs" id="sub-sx" style="display:none">
    <button class="sub-tab active" data-sub="sxList">手術紀錄</button>
    <button class="sub-tab" data-sub="track">追蹤</button>
  </div>

  <!-- Material sub-tabs -->
  <div class="sub-tabs" id="sub-mat" style="display:none">
    <button class="sub-tab active" data-sub="matRec">醫材記錄</button>
    <button class="sub-tab" data-sub="selfPay">自費醫材</button>
    <button class="sub-tab" data-sub="opCode">代碼</button>
    <button class="sub-tab" data-sub="codeRec">代碼紀錄</button>
    <button class="sub-tab" data-sub="estimate">預估</button>
  </div>

  <div id="content">
    <div id="tab-swipe-container">
    <div id="tab-swipe-inner">

    <!-- Material Page — swipeable slides -->
    <div id="pg-material" class="page">
      <div id="mat-swipe-container">
        <div id="mat-swipe-inner">

          <!-- Slide 0: 醫材記錄 -->
          <div class="mat-slide" id="pg-mat-rec">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="dot-ph"></span>
                <span class="th col-brand">廠牌</span>
                <span class="th col-product">產品</span>
                <span class="th col-qty" style="text-align:center">數量</span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span style="width:32px;flex-shrink:0"></span>
              </div>
              <div id="mat-rec-list"></div>
            </div>
          </div>

          <!-- Slide 1: 自費醫材 -->
          <div class="mat-slide" id="pg-selfpay">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="th col-brand">廠牌</span>
                <span class="th col-product">產品</span>
                <span style="width:32px;flex-shrink:0"></span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span class="th col-hosp" style="text-align:right">醫院</span>
              </div>
              <div id="selfpay-list"></div>
            </div>
          </div>

          <!-- Slide 2: 代碼 -->
          <div class="mat-slide" id="pg-opcode">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="th col-code">代碼</span>
                <span class="th col-product">術式</span>
                <span style="width:32px;flex-shrink:0"></span>
                <span class="th col-price" style="text-align:right">單價</span>
              </div>
              <div id="opcode-list"></div>
            </div>
          </div>

          <!-- Slide 3: 代碼紀錄 -->
          <div class="mat-slide" id="pg-code-rec">
            <div class="list-content">
              <div class="col-hdr-row">
                <span class="dot-ph"></span>
                <span class="th col-product">術式</span>
                <span class="th col-code">代碼</span>
                <span class="th col-price" style="text-align:right">單價</span>
                <span class="th col-qty" style="text-align:center">量</span>
                <span class="th col-area" style="text-align:right">院區</span>
              </div>
              <div id="code-rec-list"></div>
            </div>
          </div>

          <!-- Slide 4: 預估 -->
          <div class="mat-slide" id="pg-estimate">
            <div class="est-table-wrap">
              <table class="est-table">
                <thead id="est-thead"><tr><th>項目</th></tr></thead>
                <tbody id="est-tbody"></tbody>
              </table>
            </div>
          </div>

        </div><!-- /mat-swipe-inner -->
      </div><!-- /mat-swipe-container -->
    </div><!-- /pg-material -->


    <!-- Surgery Page -->
    <div id="pg-surgery" class="page">
      <div class="sub-page" id="pg-sx-list">
        <div class="sx-wrap">
          <table class="sx-table">
            <thead><tr>
              <th>日期</th><th class="th-name">姓名</th><th>類型</th>
              <th>名稱</th><th>部位</th><th>骨材</th><th>備註</th>
            </tr></thead>
            <tbody id="sx-list-body"><tr><td colspan="8" class="load-msg">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="sub-page" id="pg-track" style="display:none">
        <div class="sx-wrap">
          <table class="sx-table">
            <thead><tr>
              <th>日期</th><th class="th-name">姓名</th><th>類型</th>
              <th>名稱</th><th>部位</th><th>骨材</th><th>備註</th>
            </tr></thead>
            <tbody id="track-list-body"><tr><td colspan="8" class="load-msg">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>


    <!-- Clinic Page -->
    <div id="pg-clinic" class="page">
      <div class="list-content" id="clinic-content"></div>
    </div>

        </div><!-- /tab-swipe-inner -->
    </div><!-- /tab-swipe-container -->
  </div><!-- /content -->

  <div id="bottom-tabs">
    <button class="tab-btn" data-tab="material">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="2" width="6" height="3" rx="1"/><path d="M16 2h2a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h2"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="12" y2="18"/></svg>醫材
    </button>

<div class="modal-bd" id="modal-search" onclick="if(event.target===this)APP.closeSearch()">

  <div style="padding:12px 16px 0">

    </div>
  </div>
